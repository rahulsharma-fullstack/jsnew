<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">

  <header>
    <h1>Task Manager</h1>
    <button class="theme-btn" id="themeBtn">Dark</button>
  </header>

  <div class="card">
    <form id="taskForm">
      <div>
        <input type="text" id="title" placeholder="Task title" maxlength="100">
        <div class="error" id="titleError"></div>
      </div>
      <textarea id="description" placeholder="Description (optional)" maxlength="300"></textarea>
      <div class="row">
        <select id="category">
          <option value="Personal">Personal</option>
          <option value="Work">Work</option>
          <option value="Urgent">Urgent</option>
        </select>
        <select id="priority">
          <option value="low">Low priority</option>
          <option value="medium" selected>Medium priority</option>
          <option value="high">High priority</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="submit" id="submitBtn">Add Task</button>
        <button type="button" class="cancel" id="cancelBtn" style="display:none;">Cancel</button>
      </div>
    </form>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="Search tasks...">
    <select id="sort">
      <option value="newest">Newest first</option>
      <option value="priority">By priority</option>
      <option value="title">A-Z</option>
    </select>
  </div>

  <div class="filters" id="filters"></div>
  <div class="stats" id="stats"></div>
  <div id="tasks"></div>

</div>

<div class="toast-container" id="toasts"></div>

<script src="script.js"></script>
</body>
</html>
